<!-- Google Fonts: Noto Sans KR -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════ */
:root {
  --blue-50:  #eff6ff;
  --blue-100: #dbeafe;
  --blue-200: #bfdbfe;
  --blue-300: #93c5fd;
  --blue-400: #60a5fa;
  --blue-500: #3b82f6;
  --blue-600: #2563eb;
  --blue-700: #1d4ed8;
  --blue-800: #1e40af;
  --gray-50:  #f8fafc;
  --gray-100: #f1f5f9;
  --gray-200: #e2e8f0;
  --gray-300: #cbd5e1;
  --gray-400: #94a3b8;
  --gray-500: #64748b;
  --gray-600: #475569;
  --gray-700: #334155;
  --gray-800: #1e293b;
  --gray-900: #0f172a;
  --white: #ffffff;
  --danger: #ef4444;
  --success: #22c55e;
  --warn: #f59e0b;

  --font: 'Noto Sans KR', sans-serif;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 2px 8px rgba(0,0,0,.04);
  --shadow-md: 0 4px 16px rgba(37,99,235,.08), 0 1px 4px rgba(0,0,0,.06);
}

/* ═══════════════════════════════════════════════
   BASE
═══════════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--gray-50);
  color: var(--gray-800);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════════
   NAV
═══════════════════════════════════════════════ */
nav {
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  display: flex;
  align-items: center;
  padding: 0 20px;
  height: 56px;
  gap: 4px;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 1px 0 var(--gray-100);
}
.nav-logo {
  font-size: 15px;
  font-weight: 700;
  color: var(--blue-600);
  letter-spacing: -0.5px;
  margin-right: 12px;
  white-space: nowrap;
  text-decoration: none;
}
.nav-logo span { color: var(--gray-800); }
.nav-btn {
  padding: 7px 13px;
  border: none;
  background: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--gray-500);
  transition: all .15s;
  font-family: var(--font);
  white-space: nowrap;
}
.nav-btn:hover { background: var(--blue-50); color: var(--blue-600); }
.nav-btn.active { background: var(--blue-600); color: var(--white); }
.nav-spacer { flex: 1; }
.admin-badge {
  font-size: 11px;
  background: var(--blue-600);
  color: white;
  padding: 2px 8px;
  border-radius: 99px;
  font-weight: 600;
  letter-spacing: 0.3px;
}

/* ═══════════════════════════════════════════════
   PAGE LAYOUT
═══════════════════════════════════════════════ */
.page { display: none; padding: 24px 20px; max-width: 960px; margin: 0 auto; }
.page.active { display: block; }

/* ═══════════════════════════════════════════════
   CARD
═══════════════════════════════════════════════ */
.card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 22px 24px;
  border: 1px solid var(--gray-200);
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--gray-700);
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title svg { color: var(--blue-500); flex-shrink: 0; }

/* ═══════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════ */
.btn {
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--gray-200);
  background: var(--white);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--gray-700);
  transition: all .15s;
  font-family: var(--font);
  line-height: 1;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { background: var(--gray-50); border-color: var(--gray-300); }
.btn:active { transform: scale(.98); }
.btn.primary {
  background: var(--blue-600);
  color: var(--white);
  border-color: var(--blue-600);
}
.btn.primary:hover { background: var(--blue-700); border-color: var(--blue-700); }
.btn.danger { background: var(--danger); color: var(--white); border-color: var(--danger); }
.btn.danger:hover { background: #dc2626; border-color: #dc2626; }
.btn.success-btn { background: var(--success); color: var(--white); border-color: var(--success); }
.btn.warn-btn { background: var(--warn); color: var(--white); border-color: var(--warn); }
.btn.sm { padding: 6px 12px; font-size: 12px; }
.btn.xs { padding: 4px 9px; font-size: 11px; }
.btn-group { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

/* ═══════════════════════════════════════════════
   INPUTS
═══════════════════════════════════════════════ */
input[type=time],input[type=text],input[type=number],textarea,select {
  padding: 9px 12px;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-size: 13px;
  outline: none;
  transition: border-color .15s;
  background: var(--white);
  color: var(--gray-800);
  font-family: var(--font);
}
input:focus, textarea:focus, select:focus { border-color: var(--blue-400); }
textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

/* ═══════════════════════════════════════════════
   TIMER PAGE
═══════════════════════════════════════════════ */
.timer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media(max-width:640px) { .timer-grid { grid-template-columns: 1fr; } }

.timer-display {
  font-size: 58px;
  font-weight: 300;
  letter-spacing: -2px;
  text-align: center;
  font-variant-numeric: tabular-nums;
  margin: 16px 0;
  color: var(--gray-800);
  line-height: 1;
}
.timer-sub { font-size: 12px; color: var(--gray-400); text-align: center; margin-bottom: 14px; }

/* progress ring */
.ring-wrap { display: flex; justify-content: center; margin: 4px 0; }

/* mode tabs */
.mode-tabs {
  display: flex;
  background: var(--gray-100);
  border-radius: var(--radius-sm);
  padding: 3px;
  gap: 2px;
  margin-bottom: 16px;
}
.mode-tab {
  flex: 1;
  padding: 7px 6px;
  border: none;
  background: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  color: var(--gray-500);
  transition: .15s;
  font-family: var(--font);
}
.mode-tab.active {
  background: var(--white);
  color: var(--blue-600);
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}

/* pomo dots */
.pomo-dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 12px; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: var(--gray-200); transition: .3s; }
.dot.done { background: var(--blue-500); }
.dot.active { background: var(--blue-300); }

/* ═══════════════════════════════════════════════
   ALARM
═══════════════════════════════════════════════ */
.alarm-form { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.alarm-list { display: flex; flex-direction: column; gap: 8px; }
.alarm-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--gray-50);
  border-radius: var(--radius-sm);
  border: 1px solid var(--gray-100);
}
.alarm-time { font-size: 22px; font-weight: 600; color: var(--gray-800); }
.alarm-label { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
.toggle {
  width: 44px; height: 24px;
  background: var(--gray-300);
  border-radius: 12px;
  cursor: pointer;
  position: relative;
  transition: .2s;
  border: none;
  flex-shrink: 0;
}
.toggle.on { background: var(--blue-500); }
.toggle::after {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  background: #fff;
  border-radius: 50%;
  top: 3px; left: 3px;
  transition: .2s;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.toggle.on::after { left: 23px; }

/* ═══════════════════════════════════════════════
   STATS
═══════════════════════════════════════════════ */
.stats-row { display: flex; gap: 12px; }
.stat-card {
  flex: 1;
  background: var(--blue-50);
  border-radius: var(--radius-sm);
  padding: 14px;
  text-align: center;
  border: 1px solid var(--blue-100);
}
.stat-num { font-size: 26px; font-weight: 700; color: var(--blue-600); }
.stat-label { font-size: 11px; color: var(--blue-400); margin-top: 2px; font-weight: 500; }

/* ═══════════════════════════════════════════════
   TODO
═══════════════════════════════════════════════ */
.todo-form { display: flex; gap: 8px; margin-bottom: 14px; }
.todo-form input { flex: 1; }
.todo-progress { font-size: 12px; color: var(--gray-400); margin-bottom: 12px; }
.todo-progress-bar {
  height: 4px;
  background: var(--gray-100);
  border-radius: 99px;
  margin-bottom: 14px;
  overflow: hidden;
}
.todo-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blue-400), var(--blue-600));
  border-radius: 99px;
  transition: width .4s ease;
}
.todo-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--gray-50);
  border-radius: var(--radius-sm);
  border: 1px solid var(--gray-100);
  margin-bottom: 6px;
  transition: .15s;
}
.todo-item.done { opacity: .55; }
.todo-item.done span { text-decoration: line-through; }
.checkbox {
  width: 20px; height: 20px;
  border-radius: 6px;
  border: 2px solid var(--gray-300);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: .15s;
  flex-shrink: 0;
  font-size: 11px;
  color: transparent;
}
.checkbox.checked {
  background: var(--blue-500);
  border-color: var(--blue-500);
  color: var(--white);
}
.todo-del {
  margin-left: auto;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--gray-300);
  font-size: 18px;
  line-height: 1;
  padding: 2px 4px;
  border-radius: 4px;
  transition: .15s;
}
.todo-del:hover { color: var(--danger); background: #fee2e2; }

/* ═══════════════════════════════════════════════
   ANNOTATION
═══════════════════════════════════════════════ */
.upload-area {
  border: 2px dashed var(--gray-200);
  border-radius: var(--radius);
  padding: 40px;
  text-align: center;
  cursor: pointer;
  transition: .15s;
  margin-bottom: 16px;
  display: block;
  color: var(--gray-500);
}
.upload-area:hover { border-color: var(--blue-300); background: var(--blue-50); color: var(--blue-500); }
.upload-area input { display: none; }
.tool-bar {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
  padding: 10px 12px;
  background: var(--gray-50);
  border-radius: var(--radius-sm);
  border: 1px solid var(--gray-200);
}
.tool-btn {
  width: 34px; height: 34px;
  border-radius: 6px;
  border: 1.5px solid var(--gray-200);
  background: var(--white);
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: .15s;
  font-family: var(--font);
  color: var(--gray-600);
}
.tool-btn:hover { background: var(--blue-50); border-color: var(--blue-200); color: var(--blue-600); }
.tool-btn.active { background: var(--blue-500); color: var(--white); border-color: var(--blue-500); }
.color-picker-row { display: flex; gap: 5px; align-items: center; }
.color-swatch {
  width: 22px; height: 22px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: .1s;
}
.color-swatch.active { border-color: var(--blue-500); transform: scale(1.2); }
#canvas-wrap {
  position: relative;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: var(--white);
  min-height: 300px;
}
#canvas-wrap canvas { display: block; }
.size-slider { width: 70px; accent-color: var(--blue-500); }

/* ═══════════════════════════════════════════════
   VOCABULARY
═══════════════════════════════════════════════ */
.vocab-form { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; margin-bottom: 14px; }
@media(max-width:500px) { .vocab-form { grid-template-columns: 1fr; } }

.vocab-toolbar {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.vocab-count { font-size: 12px; color: var(--gray-400); margin-left: auto; }

.vocab-list { display: flex; flex-direction: column; gap: 6px; }
.vocab-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  background: var(--gray-50);
  border-radius: var(--radius-sm);
  border: 1px solid var(--gray-100);
  gap: 8px;
}
.vocab-word { font-size: 15px; font-weight: 600; color: var(--gray-800); }
.vocab-mean { font-size: 13px; color: var(--gray-500); margin-top: 2px; }
.vocab-actions { display: flex; gap: 6px; flex-shrink: 0; }

/* Quiz */
.quiz-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,.6);
  backdrop-filter: blur(4px);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  display: none;
}
.quiz-modal {
  background: var(--white);
  border-radius: 20px;
  padding: 32px;
  max-width: 480px;
  width: 100%;
  box-shadow: 0 24px 64px rgba(0,0,0,.18);
  text-align: center;
}
.quiz-counter {
  font-size: 12px;
  color: var(--gray-400);
  margin-bottom: 16px;
  font-weight: 500;
}
.quiz-word {
  font-size: 36px;
  font-weight: 700;
  color: var(--gray-900);
  margin-bottom: 24px;
  letter-spacing: -1px;
}
.quiz-input-wrap {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.quiz-input-wrap input { flex: 1; font-size: 15px; padding: 11px 14px; }
.quiz-result {
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 16px;
  display: none;
}
.quiz-result.correct { background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; }
.quiz-result.wrong { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
.quiz-score-bar {
  background: var(--gray-100);
  border-radius: var(--radius-sm);
  padding: 14px;
  margin-bottom: 16px;
  display: flex;
  gap: 16px;
  justify-content: center;
}
.quiz-score-item { text-align: center; }
.quiz-score-num { font-size: 24px; font-weight: 700; }
.quiz-score-num.c { color: var(--success); }
.quiz-score-num.w { color: var(--danger); }
.quiz-score-label { font-size: 11px; color: var(--gray-400); margin-top: 2px; }

/* ═══════════════════════════════════════════════
   COMMUNITY
═══════════════════════════════════════════════ */
.community-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}
.community-header h2 { font-size: 18px; font-weight: 700; color: var(--gray-800); }

.post-form-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px 22px;
  border: 1px solid var(--gray-200);
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.post-form-card textarea {
  width: 100%;
  min-height: 72px;
  margin-bottom: 10px;
  font-size: 14px;
}
.post-form-footer {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
}

.post-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 18px 22px;
  border: 1px solid var(--gray-200);
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  transition: box-shadow .15s;
}
.post-card:hover { box-shadow: var(--shadow-md); }
.post-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.post-author {
  font-size: 12px;
  font-weight: 700;
  color: var(--blue-600);
  background: var(--blue-50);
  padding: 2px 8px;
  border-radius: 99px;
  border: 1px solid var(--blue-100);
}
.post-author.admin-author {
  background: var(--blue-600);
  color: white;
  border-color: var(--blue-600);
}
.post-time { font-size: 11px; color: var(--gray-400); }
.post-del-btn {
  margin-left: auto;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--gray-300);
  font-size: 16px;
  padding: 2px 6px;
  border-radius: 4px;
  transition: .15s;
  font-family: var(--font);
}
.post-del-btn:hover { color: var(--danger); background: #fee2e2; }
.post-content {
  font-size: 14px;
  color: var(--gray-700);
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-all;
  margin-bottom: 14px;
}

.comments-section { border-top: 1px solid var(--gray-100); padding-top: 12px; }
.comment-item {
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  background: var(--gray-50);
  margin-bottom: 6px;
  border: 1px solid var(--gray-100);
}
.comment-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}
.comment-author { font-size: 11px; font-weight: 700; color: var(--blue-600); }
.comment-author.admin-author { color: var(--blue-700); }
.comment-time { font-size: 11px; color: var(--gray-400); }
.comment-del {
  margin-left: auto;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--gray-300);
  font-size: 13px;
  padding: 1px 4px;
  border-radius: 3px;
  transition: .15s;
  font-family: var(--font);
}
.comment-del:hover { color: var(--danger); background: #fee2e2; }
.comment-content { font-size: 13px; color: var(--gray-600); line-height: 1.5; word-break: break-all; }
.comment-form {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}
.comment-form input { flex: 1; font-size: 13px; }

/* empty state */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--gray-400);
}
.empty-state svg { margin-bottom: 12px; color: var(--gray-300); }
.empty-state p { font-size: 14px; }

/* ═══════════════════════════════════════════════
   NOTIFICATION
═══════════════════════════════════════════════ */
.notif {
  position: fixed;
  top: 68px;
  right: 20px;
  background: var(--gray-900);
  color: var(--white);
  padding: 11px 18px;
  border-radius: 10px;
  font-size: 13px;
  z-index: 999;
  opacity: 0;
  transform: translateY(-8px) translateX(8px);
  transition: .25s cubic-bezier(.16,1,.3,1);
  pointer-events: none;
  max-width: 280px;
  line-height: 1.4;
  box-shadow: 0 8px 24px rgba(0,0,0,.2);
}

<script>
/* ══════════════════════════════════════════════════════
   ADMIN DETECTION
══════════════════════════════════════════════════════ */
const urlParams = new URLSearchParams(location.search);
const IS_ADMIN = urlParams.get('admin') === ADMIN_SECRET;
const AUTHOR_NAME = IS_ADMIN ? '운영자' : '익명';

if (IS_ADMIN) {
  document.getElementById('admin-badge').style.display = 'inline-block';
}
document.getElementById('post-author-label').textContent = IS_ADMIN ? '운영자로 게시됩니다' : '익명으로 게시됩니다';

/* ══════════════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════════════ */
function notify(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.classList.add('show');
  clearTimeout(n._t);
  n._t = setTimeout(() => n.classList.remove('show'), 2600);
}
function pad(n) { return String(n).padStart(2, '0'); }
function goto(page, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  if (btn) btn.classList.add('active');
  if (page === 'community') initCommunity();
}
function timeAgo(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = (Date.now() - d) / 1000;
  if (diff < 60) return '방금';
  if (diff < 3600) return Math.floor(diff/60) + '분 전';
  if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
  return d.toLocaleDateString('ko-KR', { month:'short', day:'numeric' });
}

/* ══════════════════════════════════════════════════════
   DB READY
══════════════════════════════════════════════════════ */
function setDbStatus(ok) {
  const el1 = document.getElementById('db-status');
  const el2 = document.getElementById('community-db-status');
  if (ok) {
    [el1, el2].forEach(e => { e.className = 'db-status ok'; e.textContent = '연결됨'; });
  } else {
    [el1, el2].forEach(e => { e.className = 'db-status err'; e.textContent = '연결 오류'; });
  }
}

// LocalStorage fallback when Firebase is not configured
const USE_LOCAL = FIREBASE_CONFIG.apiKey === "YOUR_API_KEY";
if (USE_LOCAL) {
  document.getElementById('db-status').className = 'db-status warn';
  document.getElementById('db-status').textContent = 'Firebase 미설정 (로컬)';
  document.getElementById('db-status').style.cssText += 'background:#fef9c3;color:#854d0e;';
}

function lsLoad(k, def) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } }
function lsSave(k, v)  { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

/* ══════════════════════════════════════════════════════
   POMODORO
══════════════════════════════════════════════════════ */
const POMO_MODES = { focus: 25*60, short: 5*60, long: 15*60 };
const POMO_LABELS = { focus: '집중 시간', short: '짧은 휴식', long: '긴 휴식' };
let pomoMode = 'focus', pomoLeft = 25*60, pomoRunning = false, pomoInterval = null;
let pomoSession = 0, pomoDone = lsLoad('pomoDone', 0);

function updatePomoDisplay() {
  const m = Math.floor(pomoLeft / 60), s = pomoLeft % 60;
  document.getElementById('pomo-display').textContent = pad(m) + ':' + pad(s);
  const total = POMO_MODES[pomoMode];
  const pct = 1 - pomoLeft / total;
  document.getElementById('pomo-ring').style.strokeDashoffset = 427 * (1 - pct);
  document.getElementById('pomo-ring').style.stroke = pomoMode === 'focus' ? '#3b82f6' : '#22c55e';
}
function renderPomoDots() {
  const d = document.getElementById('pomo-dots');
  d.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i < pomoDone % 4 ? ' done' : '') + (i === pomoSession && pomoMode === 'focus' ? ' active' : '');
    d.appendChild(dot);
  }
}
function setPomoMode(mode, el) {
  if (pomoRunning) return;
  pomoMode = mode;
  pomoLeft = POMO_MODES[mode];
  document.getElementById('pomo-status').textContent = POMO_LABELS[mode];
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  updatePomoDisplay();
}
function pomoToggle() {
  pomoRunning = !pomoRunning;
  document.getElementById('pomo-btn').textContent = pomoRunning ? '일시정지' : '시작';
  if (pomoRunning) {
    pomoInterval = setInterval(() => {
      if (pomoLeft <= 0) {
        clearInterval(pomoInterval); pomoRunning = false;
        playBeep();
        if (pomoMode === 'focus') {
          pomoDone++; lsSave('pomoDone', pomoDone);
          document.getElementById('stat-pomo').textContent = pomoDone;
        }
        notify(POMO_LABELS[pomoMode] + ' 완료!');
        renderPomoDots();
        document.getElementById('pomo-btn').textContent = '시작';
        return;
      }
      pomoLeft--; updatePomoDisplay();
    }, 1000);
  } else clearInterval(pomoInterval);
}
function pomoReset() {
  clearInterval(pomoInterval); pomoRunning = false;
  pomoLeft = POMO_MODES[pomoMode];
  document.getElementById('pomo-btn').textContent = '시작';
  updatePomoDisplay();
}
function pomoSkip() { pomoLeft = 0; updatePomoDisplay(); }
updatePomoDisplay(); renderPomoDots();
document.getElementById('stat-pomo').textContent = pomoDone;

/* ══════════════════════════════════════════════════════
   COUNTDOWN TIMER
══════════════════════════════════════════════════════ */
let timerLeft = 0, timerRunning = false, timerInterval = null;
function timerToggle() {
  if (!timerRunning) {
    const h = parseInt(document.getElementById('timer-h').value)||0;
    const m = parseInt(document.getElementById('timer-m').value)||0;
    const s = parseInt(document.getElementById('timer-s').value)||0;
    if (!timerLeft) { timerLeft = h*3600+m*60+s; }
    if (!timerLeft) return;
  }
  timerRunning = !timerRunning;
  document.getElementById('timer-btn').textContent = timerRunning ? '일시정지' : '시작';
  if (timerRunning) {
    timerInterval = setInterval(() => {
      if (timerLeft <= 0) {
        clearInterval(timerInterval); timerRunning = false;
        playBeep(); notify('타이머 종료!');
        document.getElementById('timer-btn').textContent = '시작'; return;
      }
      timerLeft--;
      const h=Math.floor(timerLeft/3600), m=Math.floor((timerLeft%3600)/60), s=timerLeft%60;
      document.getElementById('timer-display').textContent = (h?pad(h)+':':'') + pad(m)+':'+pad(s);
    }, 1000);
  } else clearInterval(timerInterval);
}
function timerReset() {
  clearInterval(timerInterval); timerRunning = false; timerLeft = 0;
  document.getElementById('timer-btn').textContent = '시작';
  document.getElementById('timer-display').textContent = '25:00';
}

══════════════════════════════════════════════════════ */
let swStart=0, swElapsed=0, swRunning=false, swInterval=null, swLaps=[];
function swToggle() {
  swRunning = !swRunning;
  document.getElementById('sw-btn').textContent = swRunning ? '일시정지' : '시작';
  if (swRunning) { swStart = Date.now() - swElapsed; swInterval = setInterval(swTick, 100); }
  else clearInterval(swInterval);
}
function swTick() {
  swElapsed = Date.now() - swStart;
  const h=Math.floor(swElapsed/3600000), m=Math.floor((swElapsed%3600000)/60000), s=Math.floor((swElapsed%60000)/1000);
  document.getElementById('sw-display').textContent = pad(h)+':'+pad(m)+':'+pad(s);
  const sm = Math.floor(swElapsed/60000);
  document.getElementById('stat-sw').textContent = pad(Math.floor(sm/60))+':'+pad(sm%60);
}
function swLap() {
  if (!swRunning) return;
  const h=Math.floor(swElapsed/3600000), m=Math.floor((swElapsed%3600000)/60000), s=Math.floor((swElapsed%60000)/1000);
  const label = `랩 ${swLaps.length+1}: ${pad(h)}:${pad(m)}:${pad(s)}`;
  swLaps.push(label);
  const laps = document.getElementById('sw-laps');
  laps.innerHTML = swLaps.slice(-5).map(l => `<div style="padding:1px 0">${l}</div>`).join('');
  laps.scrollTop = laps.scrollHeight;
}
function swReset() {
  clearInterval(swInterval); swRunning=false; swElapsed=0; swStart=0; swLaps=[];
  document.getElementById('sw-display').textContent = '00:00:00';
  document.getElementById('sw-btn').textContent = '시작';
  document.getElementById('sw-laps').innerHTML = '';
}

/* ══════════════════════════════════════════════════════
   BEEP
══════════════════════════════════════════════════════ */
function playBeep() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [0,0.3,0.6].forEach(t => {
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=880; o.type='sine';
      g.gain.setValueAtTime(0.3, ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+0.3);
      o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.3);
    });
  } catch(e) {}
}

══════════════════════════════════════════════════════ */
let canvas=null, currentTool='pen', currentColor='#1e293b', brushSize=3;
let history=[], imgLoaded=false;

function initCanvas(w, h) {
  if (canvas) canvas.dispose();
  document.getElementById('canvas-wrap').innerHTML = '<canvas id="main-canvas"></canvas>';
  canvas = new fabric.Canvas('main-canvas', { width:w, height:h, isDrawingMode:true });
  canvas.freeDrawingBrush.color = currentColor;
  canvas.freeDrawingBrush.width = brushSize;
  canvas.on('object:added', () => { history.push(JSON.stringify(canvas)); });
}
function loadImage(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const maxW = document.getElementById('canvas-wrap').offsetWidth || 800;
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
      initCanvas(w, h);
      fabric.Image.fromURL(ev.target.result, fimg => {
        fimg.set({ left:0, top:0, scaleX:w/img.width, scaleY:h/img.height, selectable:false, evented:false });
        canvas.add(fimg); canvas.sendToBack(fimg); canvas.renderAll();
        imgLoaded = true;
        document.getElementById('upload-area').style.display = 'none';
        document.getElementById('tool-bar').style.display = 'flex';
        history = [];
      });
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tool-'+tool).classList.add('active');
  if (!canvas) return;
  if (tool==='pen') {
    canvas.isDrawingMode=true;
    canvas.freeDrawingBrush=new fabric.PencilBrush(canvas);
    canvas.freeDrawingBrush.color=currentColor;
    canvas.freeDrawingBrush.width=brushSize;
  } else if (tool==='highlight') {
    canvas.isDrawingMode=true;
    canvas.freeDrawingBrush=new fabric.PencilBrush(canvas);
    canvas.freeDrawingBrush.color=hexToRgba(currentColor,0.35);
    canvas.freeDrawingBrush.width=20;
  } else if (tool==='erase') {
    canvas.isDrawingMode=true;
    canvas.freeDrawingBrush=new fabric.PencilBrush(canvas);
    canvas.freeDrawingBrush.color='#ffffff';
    canvas.freeDrawingBrush.width=20;
  } else if (tool==='text') {
    canvas.isDrawingMode=false;
    canvas.on('mouse:down', addTextOnClick);
  } else if (tool==='select') {
    canvas.isDrawingMode=false;
    canvas.off('mouse:down', addTextOnClick);
  }
}
function addTextOnClick(opt) {
  if (currentTool !== 'text') return;
  const p = canvas.getPointer(opt.e);
  const t = new fabric.IText('텍스트', { left:p.x, top:p.y, fontSize:18, fill:currentColor, fontFamily:'Noto Sans KR,sans-serif' });
  canvas.add(t); canvas.setActiveObject(t); t.enterEditing(); t.selectAll();
  canvas.off('mouse:down', addTextOnClick);
  currentTool = 'select';
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tool-select').classList.add('active');
}
function hexToRgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function setColor(c, el) {
  currentColor = c;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  if (el) el.classList.add('active');
  if (!canvas) return;
  if (currentTool==='pen') canvas.freeDrawingBrush.color=c;
  else if (currentTool==='highlight') canvas.freeDrawingBrush.color=hexToRgba(c,0.35);
}
function setBrushSize(v) {
  brushSize = parseInt(v);
  document.getElementById('size-label').textContent = v;
  if (canvas && canvas.isDrawingMode) canvas.freeDrawingBrush.width = brushSize;
}
function undoCanvas() {
  if (!canvas || history.length < 2) return;
  history.pop();
  canvas.loadFromJSON(history[history.length-1]||'{}', () => canvas.renderAll());
}
function clearAnnotations() {
  if (!canvas) return;
  const bg = canvas.getObjects().find(o => !o.selectable);
  canvas.clear();
  if (bg) canvas.add(bg);
  canvas.renderAll(); history = [];
}
function saveCanvas() {
  if (!canvas) return;
  const a = document.createElement('a');
  a.download = 'study-note.png';
  a.href = canvas.toDataURL({ format:'png', quality:1 });
  a.click(); notify('저장 완료!');
}

let vocabList = lsLoad('ss-vocab', []);
let quizMode=false, quizIdx=0, quizOrder=[], quizCorrect=0, quizWrong=0, quizAnswered=false;

function renderVocab() {
  document.getElementById('vocab-count').textContent = `총 ${vocabList.length}개`;
  document.getElementById('vocab-list').innerHTML = vocabList.length ? vocabList.map((v,i) => `
    <div class="vocab-item">
      <div>
        <div class="vocab-word">${escHtml(v.word)}</div>
        <div class="vocab-mean">${escHtml(v.mean)}</div>
      </div>
      <div class="vocab-actions">
        <button class="btn xs danger" onclick="deleteVocab(${i})">삭제</button>
      </div>
    </div>`).join('') : '<div style="font-size:13px;color:var(--gray-400);padding:12px 0;text-align:center">단어를 추가하세요</div>';
}
function addVocab() {
  const w = document.getElementById('vocab-word').value.trim();
  const m = document.getElementById('vocab-mean').value.trim();
  if (!w || !m) { notify('단어와 뜻을 모두 입력하세요'); return; }
  vocabList.unshift({ word: w, mean: m });
  lsSave('ss-vocab', vocabList); renderVocab();
  document.getElementById('vocab-word').value = '';
  document.getElementById('vocab-mean').value = '';
  document.getElementById('vocab-word').focus();
}
function deleteVocab(i) { vocabList.splice(i,1); lsSave('ss-vocab', vocabList); renderVocab(); }
function shuffleVocab() {
  for (let i=vocabList.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [vocabList[i],vocabList[j]]=[vocabList[j],vocabList[i]];
  }
  lsSave('ss-vocab', vocabList); renderVocab(); notify('섞었습니다');
}
function startQuiz() {
  if (!vocabList.length) { notify('단어를 먼저 추가하세요'); return; }
  quizMode=true; quizIdx=0; quizCorrect=0; quizWrong=0; quizAnswered=false;
  quizOrder = [...Array(vocabList.length).keys()].sort(() => Math.random()-.5);
  document.getElementById('quiz-overlay').style.display = 'flex';
  document.getElementById('quiz-correct').textContent = '0';
  document.getElementById('quiz-wrong').textContent = '0';
  showQuizWord();
}
function showQuizWord() {
  const v = vocabList[quizOrder[quizIdx]];
  document.getElementById('quiz-counter').textContent = `${quizIdx+1} / ${quizOrder.length}`;
  document.getElementById('quiz-word').textContent = v.word;
  document.getElementById('quiz-input').value = '';
  document.getElementById('quiz-result').style.display = 'none';
  document.getElementById('quiz-next-btn').style.display = 'none';
  quizAnswered = false;
  setTimeout(() => document.getElementById('quiz-input').focus(), 100);
}
function checkAnswer() {
  if (quizAnswered) { nextQuiz(); return; }
  const input = document.getElementById('quiz-input').value.trim();
  if (!input) return;
  const correct = vocabList[quizOrder[quizIdx]].mean;
  const isCorrect = input === correct ||
    input.replace(/\s/g,'') === correct.replace(/\s/g,'') ||
    correct.split(/[,\/,、]/).map(s=>s.trim()).some(s => s && input.includes(s));
  const resultEl = document.getElementById('quiz-result');
  if (isCorrect) {
    quizCorrect++;
    resultEl.className = 'quiz-result correct';
    resultEl.textContent = '정답! — ' + correct;
  } else {
    quizWrong++;
    resultEl.className = 'quiz-result wrong';
    resultEl.textContent = '오답. 정답: ' + correct;
  }
  resultEl.style.display = 'block';
  document.getElementById('quiz-correct').textContent = quizCorrect;
  document.getElementById('quiz-wrong').textContent = quizWrong;
  quizAnswered = true;
  if (quizIdx < quizOrder.length - 1) {
    document.getElementById('quiz-next-btn').style.display = 'inline-flex';
  } else {
    document.getElementById('quiz-next-btn').style.display = 'none';
    setTimeout(() => {
      const total = quizOrder.length;
      const pct = Math.round(quizCorrect/total*100);
      notify(`퀴즈 완료! ${quizCorrect}/${total} (${pct}%)`);
    }, 800);
  }
}
function nextQuiz() {
  quizIdx++;
  if (quizIdx >= quizOrder.length) { stopQuiz(); return; }
  showQuizWord();
}
function stopQuiz() {
  quizMode = false;
  document.getElementById('quiz-overlay').style.display = 'none';
}
document.getElementById('quiz-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('quiz-overlay')) stopQuiz();
});
renderVocab();

let communityInited = false;
let postsUnsubscribe = null;

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function initCommunity() {
  if (communityInited) return;
  communityInited = true;

  if (USE_LOCAL) {
    // LocalStorage fallback
    document.getElementById('community-db-status').className = 'db-status';
    document.getElementById('community-db-status').style.cssText = 'background:#fef9c3;color:#854d0e;font-size:11px;padding:3px 8px;border-radius:99px;font-weight:500;';
    document.getElementById('community-db-status').textContent = 'Firebase 미설정';
    renderLocalPosts();
    return;
  }

  // Wait for DB
  if (!window._dbReady) {
    await new Promise(r => window.addEventListener('db-ready', r, { once: true }));
  }

  try {
    setDbStatus(true);
    const db = window._db;
    const { collection, query, orderBy, onSnapshot } = window._fs;
    const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
    postsUnsubscribe = onSnapshot(q, snap => {
      const posts = [];
      snap.forEach(d => posts.push({ id: d.id, ...d.data() }));
      renderPosts(posts);
    }, err => {
      console.error(err); setDbStatus(false);
      notify('커뮤니티 연결 오류');
    });
  } catch (e) {
    console.error(e); setDbStatus(false);
    notify('Firebase 연결 실패. 설정을 확인하세요.');
  }
}

// ── LocalStorage fallback ────────────────────────────
function renderLocalPosts() {
  const posts = lsLoad('ss-posts', []).sort((a,b) => b.createdAt - a.createdAt);
  renderPosts(posts.map(p => ({...p, createdAt: { toDate: () => new Date(p.createdAt) }})));
}

// ── Firestore submit ─────────────────────────────────
async function submitPost() {
  const content = document.getElementById('post-content').value.trim();
  if (!content) return;

  if (USE_LOCAL) {
    const posts = lsLoad('ss-posts', []);
    posts.unshift({ id: Date.now()+'', content, author: AUTHOR_NAME, isAdmin: IS_ADMIN, createdAt: Date.now(), comments: [] });
    lsSave('ss-posts', posts);
    document.getElementById('post-content').value = '';
    renderLocalPosts(); notify('게시되었습니다');
    return;
  }

  if (!window._dbReady) return;
  const db = window._db;
  const { collection, addDoc, serverTimestamp } = window._fs;
  try {
    await addDoc(collection(db, 'posts'), {
      content, author: AUTHOR_NAME, isAdmin: IS_ADMIN,
      createdAt: serverTimestamp()
    });
    document.getElementById('post-content').value = '';
    notify('게시되었습니다');
  } catch(e) { console.error(e); notify('게시 실패: ' + e.message); }
}

// ── Firestore delete post ────────────────────────────
async function deletePost(postId) {
  if (!IS_ADMIN) return;
  if (!confirm('삭제하시겠습니까?')) return;

  if (USE_LOCAL) {
    let posts = lsLoad('ss-posts', []);
    posts = posts.filter(p => p.id !== postId);
    lsSave('ss-posts', posts); renderLocalPosts(); return;
  }

  const db = window._db;
  const { doc, deleteDoc } = window._fs;
  try { await deleteDoc(doc(db, 'posts', postId)); } catch(e) { notify('삭제 실패'); }
}

// ── Firestore add comment ────────────────────────────
async function submitComment(postId) {
  const input = document.getElementById('comment-input-' + postId);
  const text = input.value.trim();
  if (!text) return;

  if (USE_LOCAL) {
    const posts = lsLoad('ss-posts', []);
    const p = posts.find(x => x.id === postId);
    if (p) {
      if (!p.comments) p.comments = [];
      p.comments.push({ id: Date.now()+'', text, author: AUTHOR_NAME, isAdmin: IS_ADMIN, createdAt: Date.now() });
      lsSave('ss-posts', posts); renderLocalPosts();
    }
    input.value = ''; return;
  }

  const db = window._db;
  const { doc, updateDoc, arrayUnion, serverTimestamp } = window._fs;
  try {
    await updateDoc(doc(db, 'posts', postId), {
      comments: (window._fs.arrayUnion || arrayUnion)({
        id: Date.now()+'',
        text, author: AUTHOR_NAME, isAdmin: IS_ADMIN,
        createdAt: new Date().toISOString()
      })
    });
    input.value = '';
  } catch(e) { console.error(e); notify('댓글 등록 실패'); }
}

// ── Firestore delete comment ─────────────────────────
async function deleteComment(postId, commentId) {
  if (!IS_ADMIN) return;

  if (USE_LOCAL) {
    const posts = lsLoad('ss-posts', []);
    const p = posts.find(x => x.id === postId);
    if (p) { p.comments = (p.comments||[]).filter(c => c.id !== commentId); lsSave('ss-posts', posts); renderLocalPosts(); }
    return;
  }

  const db = window._db;
  const { doc, getDoc, updateDoc } = window._fs;
  try {
    const snap = await getDoc(doc(db, 'posts', postId));
    if (!snap.exists()) return;
    const comments = (snap.data().comments||[]).filter(c => c.id !== commentId);
    await updateDoc(doc(db, 'posts', postId), { comments });
  } catch(e) { notify('댓글 삭제 실패'); }
}

// ── Render posts ─────────────────────────────────────
function renderPosts(posts) {
  const container = document.getElementById('posts-container');
  if (!posts.length) {
    container.innerHTML = `<div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <p>아직 게시물이 없습니다</p></div>`;
    return;
  }

  container.innerHTML = posts.map(p => {
    const comments = (p.comments||[]);
    const commentsHtml = comments.map(c => `
      <div class="comment-item">
        <div class="comment-meta">
          <span class="comment-author ${c.isAdmin?'admin-author':''}">${escHtml(c.author||'익명')}</span>
          <span class="comment-time">${c.createdAt ? timeAgo(typeof c.createdAt === 'string' ? { toDate: ()=>new Date(c.createdAt) } : c.createdAt) : ''}</span>
          ${IS_ADMIN ? `<button class="comment-del" onclick="deleteComment('${p.id}','${c.id}')">×</button>` : ''}
        </div>
        <div class="comment-content">${escHtml(c.text||'')}</div>
      </div>`).join('');

    return `<div class="post-card">
      <div class="post-meta">
        <span class="post-author ${p.isAdmin?'admin-author':''}">${escHtml(p.author||'익명')}</span>
        <span class="post-time">${p.createdAt ? timeAgo(p.createdAt) : ''}</span>
        ${IS_ADMIN ? `<button class="post-del-btn" onclick="deletePost('${p.id}')">×</button>` : ''}
      </div>
      <div class="post-content">${escHtml(p.content||'')}</div>
      <div class="comments-section">
        ${commentsHtml}
        <div class="comment-form">
          <input type="text" id="comment-input-${p.id}" placeholder="댓글 달기..." onkeydown="if(event.key==='Enter')submitComment('${p.id}')">
          <button class="btn sm primary" onclick="submitComment('${p.id}')">등록</button>
        </div>
      </div>
    </div>`;
  }).join('');
}
