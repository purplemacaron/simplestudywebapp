<style>
:root{
  --b50:#eff6ff;--b100:#dbeafe;--b200:#bfdbfe;--b300:#93c5fd;
  --b400:#60a5fa;--b500:#3b82f6;--b600:#2563eb;--b700:#1d4ed8;
  --g50:#f8fafc;--g100:#f1f5f9;--g200:#e2e8f0;--g300:#cbd5e1;
  --g400:#94a3b8;--g500:#64748b;--g600:#475569;--g700:#334155;
  --g800:#1e293b;--g900:#0f172a;
  --white:#fff;--red:#ef4444;--green:#22c55e;--amber:#f59e0b;
  --font:'Noto Sans KR',sans-serif;
  --r:12px;--rs:8px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
  --shm:0 4px 20px rgba(37,99,235,.10),0 1px 4px rgba(0,0,0,.06);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--g50);color:var(--g800);min-height:100vh;-webkit-font-smoothing:antialiased}

/* NAV */
nav{background:var(--white);border-bottom:1px solid var(--g200);display:flex;align-items:center;
  padding:0 20px;height:56px;gap:4px;position:sticky;top:0;z-index:200}
.nav-logo{font-size:15px;font-weight:700;color:var(--b600);letter-spacing:-.5px;margin-right:12px;
  white-space:nowrap;cursor:pointer;text-decoration:none}
.nav-logo span{color:var(--g800)}
.nav-btn{padding:7px 13px;border:none;background:none;border-radius:var(--rs);cursor:pointer;
  font-size:13px;font-weight:500;color:var(--g500);transition:all .15s;font-family:var(--font);white-space:nowrap}
.nav-btn:hover{background:var(--b50);color:var(--b600)}
.nav-btn.active{background:var(--b600);color:var(--white)}
.nav-spacer{flex:1}
.badge{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600}
.badge-admin{background:var(--b600);color:#fff}
.badge-user{background:var(--g100);color:var(--g500);border:1px solid var(--g200)}
.auth-btn{padding:6px 14px;border-radius:var(--rs);border:1.5px solid var(--g200);background:var(--white);
  cursor:pointer;font-size:12px;font-weight:600;color:var(--g600);font-family:var(--font);
  display:inline-flex;align-items:center;gap:6px;transition:all .15s;margin-left:8px}
.auth-btn:hover{border-color:var(--b300);color:var(--b600);background:var(--b50)}

/* PAGE */
.page{display:none;padding:24px 20px;max-width:980px;margin:0 auto}
.page.active{display:block}

/* CARD */
.card{background:var(--white);border-radius:var(--r);padding:22px 24px;
  border:1px solid var(--g200);margin-bottom:16px;box-shadow:var(--sh)}
.card-title{font-size:13px;font-weight:700;color:var(--g500);margin-bottom:18px;
  display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.5px}
.card-title svg{color:var(--b400);flex-shrink:0}

/* BTN */
.btn{padding:9px 18px;border-radius:var(--rs);border:1.5px solid var(--g200);background:var(--white);
  cursor:pointer;font-size:13px;font-weight:500;color:var(--g700);transition:all .15s;
  font-family:var(--font);line-height:1;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--g50);border-color:var(--g300)}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--b600);color:#fff;border-color:var(--b600)}
.btn.primary:hover{background:var(--b700);border-color:var(--b700)}
.btn.danger{background:var(--red);color:#fff;border-color:var(--red)}
.btn.danger:hover{background:#dc2626}
.btn.ghost{background:none;border-color:transparent;color:var(--g400)}
.btn.ghost:hover{background:var(--g100);color:var(--g600);border-color:transparent}
.btn.sm{padding:6px 12px;font-size:12px}
.btn.xs{padding:4px 9px;font-size:11px}
.btn-group{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}

/* INPUTS */
input[type=time],input[type=text],input[type=number],textarea,select{
  padding:9px 12px;border:1.5px solid var(--g200);border-radius:var(--rs);
  font-size:13px;outline:none;transition:border-color .15s;background:var(--white);
  color:var(--g800);font-family:var(--font)}
input:focus,textarea:focus,select:focus{border-color:var(--b400)}
textarea{resize:vertical;min-height:80px;line-height:1.6}

/* AUTH SCREEN */
#auth-screen{position:fixed;inset:0;background:linear-gradient(135deg,var(--b50),var(--white) 60%,var(--b100));
  display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.auth-box{background:var(--white);border-radius:20px;padding:48px 40px;max-width:380px;width:100%;
  text-align:center;box-shadow:0 24px 64px rgba(37,99,235,.12),0 4px 16px rgba(0,0,0,.06);border:1px solid var(--b100)}
.auth-logo{font-size:22px;font-weight:700;color:var(--b600);letter-spacing:-.5px;margin-bottom:8px}
.auth-logo span{color:var(--g800)}
.auth-desc{font-size:14px;color:var(--g400);margin-bottom:36px;line-height:1.6}
.google-btn{width:100%;padding:14px 20px;border-radius:var(--rs);border:1.5px solid var(--g200);
  background:var(--white);cursor:pointer;font-size:14px;font-weight:600;color:var(--g700);
  font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.google-btn:hover{border-color:var(--b300);box-shadow:0 4px 16px rgba(37,99,235,.12);transform:translateY(-1px)}
.auth-note{font-size:11px;color:var(--g300);margin-top:20px;line-height:1.6}

/* LOADING */
#loading-screen{position:fixed;inset:0;background:var(--white);display:flex;align-items:center;
  justify-content:center;z-index:2000;flex-direction:column;gap:16px}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(--b100);
  border-top-color:var(--b500);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-screen .ll{font-size:18px;font-weight:700;color:var(--b600)}
#loading-screen .ll span{color:var(--g800)}

/* NOTIF */
.notif{position:fixed;top:68px;right:20px;background:var(--g900);color:#fff;padding:11px 18px;
  border-radius:10px;font-size:13px;z-index:999;opacity:0;transform:translateY(-8px) translateX(8px);
  transition:.25s cubic-bezier(.16,1,.3,1);pointer-events:none;max-width:280px;line-height:1.4;
  box-shadow:0 8px 24px rgba(0,0,0,.2)}
.notif.show{opacity:1;transform:translateY(0) translateX(0)}

/* POMO */
.timer-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:640px){.timer-grid{grid-template-columns:1fr}}

.pomo-cycle-bar{background:linear-gradient(135deg,var(--b50),var(--b100));border:1px solid var(--b200);
  border-radius:var(--r);padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.cycle-label{font-size:11px;font-weight:700;color:var(--b600);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.cycle-dots{display:flex;gap:6px}
.cdot{width:11px;height:11px;border-radius:50%;background:var(--b200);transition:.3s}
.cdot.fd{background:var(--b500)}
.cdot.rd{background:var(--green)}
.cdot.af{background:var(--b400);box-shadow:0 0 0 3px rgba(59,130,246,.25)}
.cdot.ar{background:var(--green);box-shadow:0 0 0 3px rgba(34,197,94,.25)}

.pomo-phase{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  padding:3px 10px;border-radius:99px;display:inline-block;margin-bottom:12px}
.phase-focus{background:var(--b100);color:var(--b700)}
.phase-rest{background:#dcfce7;color:#15803d}
.phase-longrest{background:#fef3c7;color:#92400e}

.pomo-settings{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.pomo-settings label{font-size:12px;color:var(--g500);display:flex;align-items:center;gap:5px;white-space:nowrap}
.pomo-settings input[type=number]{width:48px;text-align:center;padding:6px 8px;font-size:12px}

.timer-display{font-size:60px;font-weight:300;letter-spacing:-3px;text-align:center;
  font-variant-numeric:tabular-nums;margin:14px 0;color:var(--g900);line-height:1}
.timer-sub{font-size:12px;color:var(--g400);text-align:center;margin-bottom:14px}
.ring-wrap{display:flex;justify-content:center;margin:4px 0}

/* stats */
.stats-row{display:flex;gap:12px}
.stat-card{flex:1;background:var(--b50);border-radius:var(--rs);padding:14px;text-align:center;border:1px solid var(--b100)}
.stat-num{font-size:26px;font-weight:700;color:var(--b600)}
.stat-label{font-size:11px;color:var(--b400);margin-top:2px;font-weight:500}

/* alarm */
.alarm-form{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.alarm-item{display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;background:var(--g50);border-radius:var(--rs);border:1px solid var(--g100);margin-bottom:8px}
.alarm-time{font-size:22px;font-weight:600}
.alarm-label-text{font-size:12px;color:var(--g400);margin-top:2px}
.toggle{width:44px;height:24px;background:var(--g300);border-radius:12px;cursor:pointer;
  position:relative;transition:.2s;border:none;flex-shrink:0}
.toggle.on{background:var(--b500)}
.toggle::after{content:'';position:absolute;width:18px;height:18px;background:#fff;
  border-radius:50%;top:3px;left:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{left:23px}

/* TODO */
.todo-form{display:flex;gap:8px;margin-bottom:14px}
.todo-form input{flex:1}
.todo-bar{height:4px;background:var(--g100);border-radius:99px;margin-bottom:14px;overflow:hidden}
.todo-fill{height:100%;background:linear-gradient(90deg,var(--b400),var(--b600));border-radius:99px;transition:width .4s}
.todo-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--g50);
  border-radius:var(--rs);border:1px solid var(--g100);margin-bottom:6px}
.todo-item.done{opacity:.5}
.todo-item.done span{text-decoration:line-through}
.checkbox{width:20px;height:20px;border-radius:6px;border:2px solid var(--g300);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0;font-size:11px;color:transparent}
.checkbox.checked{background:var(--b500);border-color:var(--b500);color:#fff}
.todo-del{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--g300);
  font-size:18px;padding:2px 4px;border-radius:4px;transition:.15s}
.todo-del:hover{color:var(--red);background:#fee2e2}

/* ANNOTATION */
.upload-area{border:2px dashed var(--g200);border-radius:var(--r);padding:40px;text-align:center;
  cursor:pointer;transition:.15s;margin-bottom:16px;display:block;color:var(--g500)}
.upload-area:hover{border-color:var(--b300);background:var(--b50);color:var(--b500)}
.upload-area input{display:none}
.tool-bar{display:flex;gap:6px;align-items:center;margin-bottom:12px;flex-wrap:wrap;
  padding:10px 12px;background:var(--g50);border-radius:var(--rs);border:1px solid var(--g200)}
.tool-btn{width:34px;height:34px;border-radius:6px;border:1.5px solid var(--g200);background:var(--white);
  cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;
  transition:.15s;font-family:var(--font);color:var(--g600)}
.tool-btn:hover{background:var(--b50);border-color:var(--b200);color:var(--b600)}
.tool-btn.active{background:var(--b500);color:#fff;border-color:var(--b500)}
.color-picker-row{display:flex;gap:5px;align-items:center}
.color-swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.1s}
.color-swatch.active{border-color:var(--b500);transform:scale(1.2)}
#canvas-wrap{position:relative;border:1px solid var(--g200);border-radius:var(--rs);overflow:hidden;background:#fff;min-height:300px}
#canvas-wrap canvas{display:block}
.size-slider{width:70px;accent-color:var(--b500)}

/* VOCAB */
.vocab-form{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-bottom:14px}
@media(max-width:500px){.vocab-form{grid-template-columns:1fr}}
.vocab-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.vocab-count{font-size:12px;color:var(--g400);margin-left:auto}
.vocab-item{display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;background:var(--g50);border-radius:var(--rs);border:1px solid var(--g100);gap:8px;margin-bottom:6px}
.vocab-word{font-size:15px;font-weight:600}
.vocab-mean{font-size:13px;color:var(--g500);margin-top:2px}

/* QUIZ */
.quiz-overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);backdrop-filter:blur(4px);
  z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.quiz-modal{background:var(--white);border-radius:20px;padding:32px;max-width:480px;width:100%;
  box-shadow:0 24px 64px rgba(0,0,0,.18);text-align:center}
.quiz-counter{font-size:12px;color:var(--g400);margin-bottom:14px;font-weight:500}
.quiz-word{font-size:34px;font-weight:700;color:var(--g900);margin-bottom:20px;letter-spacing:-1px}
.quiz-input-wrap{display:flex;gap:8px;margin-bottom:14px}
.quiz-input-wrap input{flex:1;font-size:14px;padding:11px 14px}
.quiz-result{padding:12px 16px;border-radius:var(--rs);font-size:14px;font-weight:600;margin-bottom:14px;display:none}
.quiz-result.correct{background:#dcfce7;color:#16a34a;border:1px solid #bbf7d0}
.quiz-result.wrong{background:#fee2e2;color:#dc2626;border:1px solid #fecaca}
.quiz-scorebar{background:var(--g100);border-radius:var(--rs);padding:14px;margin-bottom:16px;display:flex;gap:16px;justify-content:center}
.qsi{text-align:center}
.qsn{font-size:24px;font-weight:700}
.qsn.c{color:var(--green)}
.qsn.w{color:var(--red)}
.qsl{font-size:11px;color:var(--g400);margin-top:2px}

/* COMMUNITY */
.community-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.community-header h2{font-size:18px;font-weight:700}
.post-form-card{background:var(--white);border-radius:var(--r);padding:20px 22px;border:1px solid var(--g200);margin-bottom:16px;box-shadow:var(--sh)}
.post-form-card textarea{width:100%;min-height:72px;margin-bottom:10px;font-size:14px}
.post-form-footer{display:flex;align-items:center;justify-content:flex-end;gap:8px}
.post-card{background:var(--white);border-radius:var(--r);padding:18px 22px;border:1px solid var(--g200);margin-bottom:12px;box-shadow:var(--sh);transition:box-shadow .15s}
.post-card:hover{box-shadow:var(--shm)}
.post-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.post-author{font-size:12px;font-weight:700;color:var(--b600);background:var(--b50);padding:2px 8px;border-radius:99px;border:1px solid var(--b100)}
.post-author.adm{background:var(--b600);color:#fff;border-color:var(--b600)}
.post-time{font-size:11px;color:var(--g400)}
.post-del{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--g300);font-size:16px;padding:2px 6px;border-radius:4px;transition:.15s;font-family:var(--font)}
.post-del:hover{color:var(--red);background:#fee2e2}
.post-content{font-size:14px;color:var(--g700);line-height:1.7;white-space:pre-wrap;word-break:break-all;margin-bottom:14px}
.comments-section{border-top:1px solid var(--g100);padding-top:12px}
.comment-item{padding:8px 12px;border-radius:var(--rs);background:var(--g50);margin-bottom:6px;border:1px solid var(--g100)}
.comment-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.comment-author{font-size:11px;font-weight:700;color:var(--b600)}
.comment-author.adm{color:var(--b700)}
.comment-time{font-size:11px;color:var(--g400)}
.comment-del{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--g300);font-size:13px;padding:1px 4px;border-radius:3px;transition:.15s;font-family:var(--font)}
.comment-del:hover{color:var(--red);background:#fee2e2}
.comment-content{font-size:13px;color:var(--g600);line-height:1.5;word-break:break-all}
.comment-form{display:flex;gap:6px;margin-top:10px}
.comment-form input{flex:1;font-size:13px}
.empty-state{text-align:center;padding:48px 24px;color:var(--g400)}
.empty-state p{font-size:14px;margin-top:12px}

@media(max-width:480px){
  .page{padding:16px 14px}.card{padding:16px}.timer-display{font-size:44px}
  nav{padding:0 12px;gap:2px}.nav-btn{padding:6px 9px;font-size:12px}
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen">
  <div class="ll">Simple<span>Study</span></div>
  <div class="spin"></div>
</div>

<!-- Auth -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">Simple<span>Study</span></div>
    <div class="auth-desc">공부 기록을 어디서든 이어가세요.</div>
    <button class="google-btn" onclick="doAnonymous()">👤 익명으로 시작</button>
    <p class="auth-note">데이터는 이 기기에만 저장됩니다.</p>
  </div>
</div>

<div class="notif" id="notif"></div>

<!-- Quiz Overlay -->
<div class="quiz-overlay" id="quiz-overlay">
  <div class="quiz-modal">
    <div class="quiz-counter" id="quiz-counter">1 / 10</div>
    <div class="quiz-word" id="quiz-word"></div>
    <div class="quiz-scorebar">
      <div class="qsi"><div class="qsn c" id="quiz-correct">0</div><div class="qsl">정답</div></div>
      <div class="qsi"><div class="qsn w" id="quiz-wrong">0</div><div class="qsl">오답</div></div>
    </div>
    <div class="quiz-input-wrap">
      <input type="text" id="quiz-input" placeholder="뜻을 입력하세요" onkeydown="if(event.key==='Enter')checkAnswer()">
      <button class="btn primary" onclick="checkAnswer()">확인</button>
    </div>
    <div class="quiz-result" id="quiz-result"></div>
    <div class="btn-group">
      <button class="btn" id="quiz-next-btn" onclick="nextQuiz()" style="display:none">다음</button>
      <button class="btn ghost" onclick="stopQuiz()">종료</button>
    </div>
  </div>
</div>

<!-- NAV -->
<nav id="main-nav" style="display:none">
  <span class="nav-logo" onclick="goto('timer',document.querySelectorAll('.nav-btn')[0])">Simple<span>Study</span></span>
  <button class="nav-btn active" onclick="goto('timer',this)">타이머</button>
  <button class="nav-btn" onclick="goto('annotation',this)">필기</button>
  <button class="nav-btn" onclick="goto('todo',this)">할일</button>
  <button class="nav-btn" onclick="goto('vocab',this)">단어장</button>
  <button class="nav-btn" onclick="goto('community',this)">커뮤니티</button>
  <div class="nav-spacer"></div>
  <span class="badge badge-user" id="role-badge">...</span>
  <button class="auth-btn" onclick="doSignOut()">로그아웃</button>
</nav>

<!-- TIMER PAGE -->
<div class="page active" id="page-timer">
  <div class="pomo-cycle-bar">
    <div>
      <div class="cycle-label">포모도로 사이클</div>
      <div class="cycle-dots" id="cycle-dots"></div>
    </div>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
      <span style="font-size:12px;color:var(--b600)">라운드 <span id="cycle-round">1</span> · 총 <span id="cycle-total">0</span>회</span>
      <button class="btn xs" onclick="resetCycleStats()">초기화</button>
    </div>
  </div>

  <div class="timer-grid">

<!-- ═══════════════════════════════════════════════════════
  ALL LOGIC — type="module" so Firebase ESM imports work
  HTML 안에서 직접 onclick 쓰려면 window에 함수 등록 필요
═══════════════════════════════════════════════════════ -->
<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, signInAnonymously,
  signOut as fbSignOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, doc, addDoc, getDocs,
  deleteDoc, updateDoc, onSnapshot, query, orderBy,
  serverTimestamp, getDoc, setDoc, arrayUnion, limit
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ── Init ──────────────────────────────────────────────
const app  = initializeApp(window.FIREBASE_CONFIG);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── App state ─────────────────────────────────────────
let currentUser = null;
let isAdmin     = false;
let postsUnsub  = null;

// ── Utils ─────────────────────────────────────────────
const pad    = n => String(n).padStart(2,'0');
const esc    = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const notify = msg => {
  const n = document.getElementById('notif');
  n.textContent = msg; n.classList.add('show');
  clearTimeout(n._t); n._t = setTimeout(()=>n.classList.remove('show'), 2600);
};
const timeAgo = ts => {
  if (!ts) return '';
  const d    = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = (Date.now()-d)/1000;
  if (diff<60)    return '방금';
  if (diff<3600)  return Math.floor(diff/60)+'분 전';
  if (diff<86400) return Math.floor(diff/3600)+'시간 전';
  return d.toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
};

// ── Goto (exposed to HTML) ────────────────────────────
window.goto = (page, btn) => {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  if (btn) btn.classList.add('active');
  if (page==='community') initCommunity();
};

// ── Firestore helpers ─────────────────────────────────
const userDoc = path => doc(db, `users/${currentUser.uid}/${path}`);
const userCol = path => collection(db, `users/${currentUser.uid}/${path}`);

const fsSet = async (path, data) => {
  try { await setDoc(userDoc(path), data, {merge:true}); } catch(e){ console.error(e); }
};
const fsGet = async (path, def={}) => {
  try {
    const s = await getDoc(userDoc(path));
    return s.exists() ? s.data() : def;
  } catch { return def; }
};
const fsColAdd = async (col, data) =>
  addDoc(userCol(col), {...data, createdAt:serverTimestamp()});
const fsColDel = async (col, id) =>
  deleteDoc(doc(db, `users/${currentUser.uid}/${col}/${id}`));
const fsColGet = async col => {
  const s = await getDocs(userCol(col));
  return s.docs.map(d=>({id:d.id,...d.data()}));
};
const fsColUpd = async (col, id, data) =>
  updateDoc(doc(db, `users/${currentUser.uid}/${col}/${id}`), data);

// ═══════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════
window.doAnonymous = async () => {
  try { await signInAnonymously(auth); }
  catch(e) { notify('오류: ' + e.message); }
};

window.doSignOut = async () => {
  if (!confirm('로그아웃하시겠습니까?')) return;
  if (postsUnsub) postsUnsub();
  await fbSignOut(auth);
};

onAuthStateChanged(auth, async user => {
  document.getElementById('loading-screen').style.display = 'none';
  if (!user) {
    currentUser = null; isAdmin = false;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('main-nav').style.display    = 'none';
    document.querySelectorAll('.page').forEach(p => p.style.display='none');
    return;
  }
  currentUser = user;
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('main-nav').style.display    = 'flex';
  document.querySelectorAll('.page').forEach(p => p.style.display='');
  document.getElementById('page-timer').classList.add('active');

  // Admin check via Firestore (UID never in code)
  try {
    const snap = await getDoc(doc(db,'admins',user.uid));
    isAdmin = snap.exists();
  } catch { isAdmin = false; }

  const badge = document.getElementById('role-badge');
  if (isAdmin) {
    badge.textContent = '운영자'; badge.className = 'badge badge-admin';
  } else {
    badge.textContent = user.displayName||'사용자'; badge.className = 'badge badge-user';
  }
  document.getElementById('post-author-label').textContent =
    isAdmin ? '운영자로 게시됩니다' : '익명으로 게시됩니다';

  await loadAllData();
});

async function loadAllData() {
  await Promise.all([loadTodos(), loadVocab(), loadAlarms(), loadStats()]);
}

// ═══════════════════════════════════════════════════════
// POMODORO — auto cycle
// ═══════════════════════════════════════════════════════
let pomoPhase     = 'focus';
let pomoLeft      = 0;
let pomoRunning   = false;
let pomoInterval  = null;
let pomoFocusDone = 0;      // within current round
let pomoCycleTotal = 0;     // lifetime

const getTimes = () => ({
  focus:     (parseInt(document.getElementById('pomo-focus-min').value)||25)*60,
  shortRest: (parseInt(document.getElementById('pomo-short-min').value)||5)*60,
  longRest:  (parseInt(document.getElementById('pomo-long-min').value)||15)*60,
  cycleCount: parseInt(document.getElementById('pomo-cycle-count').value)||4,
});

function pomoInit() {
  const t = getTimes();
  pomoPhase = 'focus'; pomoLeft = t.focus;
  updatePomoUI(); renderCycleDots();
}

function updatePomoUI() {
  const m = Math.floor(pomoLeft/60), s = pomoLeft%60;
  document.getElementById('pomo-display').textContent = pad(m)+':'+pad(s);

  const t = getTimes();
  const total = pomoPhase==='focus' ? t.focus
              : pomoPhase==='shortRest' ? t.shortRest : t.longRest;
  const pct = 1 - pomoLeft/total;
  document.getElementById('pomo-ring').style.strokeDashoffset = 427*(1-pct);
  document.getElementById('pomo-ring').style.stroke =
    pomoPhase==='focus' ? '#3b82f6' : pomoPhase==='shortRest' ? '#22c55e' : '#f59e0b';

  const labels  = {focus:'집중',shortRest:'짧은 휴식',longRest:'긴 휴식'};
  const classes = {focus:'phase-focus',shortRest:'phase-rest',longRest:'phase-longrest'};
  const badge   = document.getElementById('pomo-phase-badge');
  badge.textContent = labels[pomoPhase];
  badge.className   = 'pomo-phase '+classes[pomoPhase];

  document.getElementById('pomo-status').textContent =
    pomoRunning ? labels[pomoPhase]+' 진행 중...' : labels[pomoPhase]+' 준비';
  document.getElementById('pomo-btn').textContent = pomoRunning ? '일시정지' : '시작';
}

function renderCycleDots() {
  const t = getTimes();
  const dots = document.getElementById('cycle-dots');
  dots.innerHTML = '';
  for (let i=0; i<t.cycleCount; i++) {
    const d = document.createElement('div');
    const done       = i < pomoFocusDone;
    const activeFoc  = i === pomoFocusDone && pomoPhase==='focus' && pomoRunning;
    const activeRest = i === pomoFocusDone-1 && (pomoPhase==='shortRest'||pomoPhase==='longRest');
    d.className = 'cdot' + (done?' fd' : activeFoc?' af' : activeRest?' ar' : '');
    dots.appendChild(d);
  }
  const t2 = getTimes();
  document.getElementById('cycle-round').textContent = Math.floor(pomoCycleTotal/t2.cycleCount)+1;
  document.getElementById('cycle-total').textContent = pomoCycleTotal;
  document.getElementById('stat-pomo').textContent   = pomoCycleTotal;
}

window.pomoToggle = () => {
  if (!pomoLeft) pomoInit();
  pomoRunning = !pomoRunning;
  updatePomoUI(); renderCycleDots();
  if (pomoRunning) {
    pomoInterval = setInterval(()=>{ if(pomoLeft<=0){pomoPhaseComplete();return;} pomoLeft--; updatePomoUI(); savePomoState(); }, 1000);
  } else {
    clearInterval(pomoInterval); savePomoState();
  }
};

function savePomoState() {
  localStorage.setItem('ss_pomo', JSON.stringify({pomoPhase, pomoLeft, pomoFocusDone, pomoCycleTotal}));
}
function loadPomoState() {
  try {
    const s = JSON.parse(localStorage.getItem('ss_pomo'));
    if (!s) return;
    pomoPhase=s.pomoPhase; pomoLeft=s.pomoLeft; pomoFocusDone=s.pomoFocusDone; pomoCycleTotal=s.pomoCycleTotal;
    updatePomoUI(); renderCycleDots();
    // 자동 재시작
    pomoRunning = true;
    pomoInterval = setInterval(()=>{ if(pomoLeft<=0){pomoPhaseComplete();return;} pomoLeft--; updatePomoUI(); savePomoState(); }, 1000);
  } catch(e) {}
}

function pomoPhaseComplete() {
  clearInterval(pomoInterval); pomoRunning = false;
  playBeep();
  const t = getTimes();
  if (pomoPhase === 'focus') {
    pomoFocusDone++; pomoCycleTotal++;
    savePomodoroStat(pomoCycleTotal);
    if (pomoFocusDone >= t.cycleCount) {
      notify('사이클 완료! 긴 휴식 시간입니다');
      pomoPhase = 'longRest'; pomoLeft = t.longRest; pomoFocusDone = 0;
    } else {
      notify('집중 완료! 짧은 휴식 시간입니다');
      pomoPhase = 'shortRest'; pomoLeft = t.shortRest;
    }
  } else {
    notify('휴식 끝! 다음 집중을 시작합니다');
    pomoPhase = 'focus'; pomoLeft = t.focus;
  }
  updatePomoUI(); renderCycleDots();
  // auto-advance after 1.5s
  setTimeout(()=>{
    pomoRunning = true; updatePomoUI(); renderCycleDots();
    pomoInterval = setInterval(()=>{ if(pomoLeft<=0){pomoPhaseComplete();return;} pomoLeft--; updatePomoUI(); }, 1000);
  }, 1500);
}

window.pomoReset = () => {
  clearInterval(pomoInterval); pomoRunning = false; pomoFocusDone = 0;
  localStorage.removeItem('ss_pomo'); pomoInit();
};
window.pomoSkip  = () => { pomoLeft = 0; };
window.resetCycleStats = () => {
  pomoCycleTotal = 0; pomoFocusDone = 0; renderCycleDots(); notify('통계 초기화');
};
async function savePomodoroStat(total) {

// BEEP
// ═══════════════════════════════════════════════════════
function playBeep() {
  try {
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    [0,0.3,0.6].forEach(t=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=880; o.type='sine';
      g.gain.setValueAtTime(0.3,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.3);
      o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.3);
    });
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════
let canvas=null, currentTool='pen', currentColor='#1e293b', brushSize=3, history=[];

function initCanvas(w,h) {
  if (canvas) canvas.dispose();
  document.getElementById('canvas-wrap').innerHTML='<canvas id="main-canvas"></canvas>';
  canvas=new fabric.Canvas('main-canvas',{width:w,height:h,isDrawingMode:true});
  canvas.freeDrawingBrush.color=currentColor;
  canvas.freeDrawingBrush.width=brushSize;
  canvas.on('object:added',()=>{history.push(JSON.stringify(canvas));});
}
window.loadImage = e => {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const maxW=document.getElementById('canvas-wrap').offsetWidth||800;
      const scale=Math.min(1,maxW/img.width);
      const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
      initCanvas(w,h);
      fabric.Image.fromURL(ev.target.result,fimg=>{
        fimg.set({left:0,top:0,scaleX:w/img.width,scaleY:h/img.height,selectable:false,evented:false});
        canvas.add(fimg); canvas.sendToBack(fimg); canvas.renderAll();
        document.getElementById('upload-area').style.display='none';
        document.getElementById('tool-bar').style.display='flex';
        history=[];
      });
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
};
window.setTool = tool => {
  currentTool=tool;
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tool-'+tool).classList.add('active');
  if (!canvas) return;
  if (tool==='pen') {
    canvas.isDrawingMode=true; canvas.freeDrawingBrush=new fabric.PencilBrush(canvas);
    canvas.freeDrawingBrush.color=currentColor; canvas.freeDrawingBrush.width=brushSize;
  } else if (tool==='highlight') {
    canvas.isDrawingMode=true; canvas.freeDrawingBrush=new fabric.PencilBrush(canvas);
    canvas.freeDrawingBrush.color=hexRgba(currentColor,.35); canvas.freeDrawingBrush.width=20;
  } else if (tool==='erase') {
    canvas.isDrawingMode=true; canvas.freeDrawingBrush=new fabric.PencilBrush(canvas);
    canvas.freeDrawingBrush.color='#ffffff'; canvas.freeDrawingBrush.width=20;
  } else if (tool==='text') {
    canvas.isDrawingMode=false; canvas.on('mouse:down',addText);
  } else {
    canvas.isDrawingMode=false; canvas.off('mouse:down',addText);
  }
};
function addText(opt) {
  if (currentTool!=='text') return;
  const p=canvas.getPointer(opt.e);
  const t=new fabric.IText('텍스트',{left:p.x,top:p.y,fontSize:18,fill:currentColor,fontFamily:'Noto Sans KR,sans-serif'});
  canvas.add(t); canvas.setActiveObject(t); t.enterEditing(); t.selectAll();
  canvas.off('mouse:down',addText); currentTool='select';
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tool-select').classList.add('active');
}
function hexRgba(hex,a) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
window.setColor = (c,el) => {
  currentColor=c;
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active'));
  if (el) el.classList.add('active');
  if (!canvas) return;
  if (currentTool==='pen') canvas.freeDrawingBrush.color=c;
  else if (currentTool==='highlight') canvas.freeDrawingBrush.color=hexRgba(c,.35);
};
window.setBrushSize = v => {
  brushSize=parseInt(v); document.getElementById('size-label').textContent=v;
  if (canvas&&canvas.isDrawingMode) canvas.freeDrawingBrush.width=brushSize;
};
window.undoCanvas = () => {
  if (!canvas||history.length<2) return;
  history.pop(); canvas.loadFromJSON(history[history.length-1]||'{}',()=>canvas.renderAll());
};
window.clearAnnotations = () => {
  if (!canvas) return;
  const bg=canvas.getObjects().find(o=>!o.selectable);
  canvas.clear(); if(bg)canvas.add(bg); canvas.renderAll(); history=[];
};
window.saveCanvas = () => {
  if (!canvas) return;
  const a=document.createElement('a');
  a.download='study-note.png'; a.href=canvas.toDataURL({format:'png',quality:1}); a.click();
  notify('저장 완료!');
};
const ua=document.getElementById('upload-area');
ua.addEventListener('dragover',e=>{e.preventDefault();ua.style.borderColor='var(--b300)';});
ua.addEventListener('dragleave',()=>{ua.style.borderColor='';});
ua.addEventListener('drop',e=>{
  e.preventDefault(); ua.style.borderColor='';
  const file=e.dataTransfer.files[0];
  if (file&&file.type.startsWith('image/')) {
    const dt=new DataTransfer(); dt.items.add(file);
    document.getElementById('img-upload').files=dt.files;

let vocabList = [];

async function loadVocab() {

function renderVocab() {

window.addVocab = async () => {

  if (!w||!m) { notify('단어와 뜻을 모두 입력하세요'); return; }
  const ref=await fsColAdd('vocab',{word:w,mean:m});
  vocabList.unshift({id:ref.id,word:w,mean:m}); renderVocab();
  document.getElementById('vocab-word').value='';
  document.getElementById('vocab-mean').value='';
  document.getElementById('vocab-word').focus();
};
window.deleteVocab = async id => {
  vocabList=vocabList.filter(v=>v.id!==id);
  await fsColDel('vocab',id); renderVocab();
};
window.shuffleVocab = () => {
  for (let i=vocabList.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [vocabList[i],vocabList[j]]=[vocabList[j],vocabList[i]];
  }
  renderVocab(); notify('섞었습니다');
};
window.startQuiz = () => {
  if (!vocabList.length) { notify('단어를 먼저 추가하세요'); return; }
  quizIdx=0; quizCorrect=0; quizWrong=0; quizAnswered=false;
  quizOrder=[...Array(vocabList.length).keys()].sort(()=>Math.random()-.5);
  document.getElementById('quiz-overlay').style.display='flex';
  document.getElementById('quiz-correct').textContent='0';
  document.getElementById('quiz-wrong').textContent='0';
  showQuizWord();
};
function showQuizWord() {
  const v=vocabList[quizOrder[quizIdx]];
  document.getElementById('quiz-counter').textContent=`${quizIdx+1} / ${quizOrder.length}`;
  document.getElementById('quiz-word').textContent=v.word;
  document.getElementById('quiz-input').value='';
  document.getElementById('quiz-result').style.display='none';
  document.getElementById('quiz-next-btn').style.display='none';
  quizAnswered=false;
  setTimeout(()=>document.getElementById('quiz-input').focus(),100);
}
window.checkAnswer = () => {
  if (quizAnswered) { nextQuiz(); return; }
  const input=document.getElementById('quiz-input').value.trim();
  if (!input) return;
  const correct=vocabList[quizOrder[quizIdx]].mean;
  const isOk=input===correct
    ||input.replace(/\s/g,'')===correct.replace(/\s/g,'')
    ||correct.split(/[,\/,、]/).map(s=>s.trim()).some(s=>s&&input.includes(s));
  const el=document.getElementById('quiz-result');
  if (isOk) { quizCorrect++; el.className='quiz-result correct'; el.textContent='정답! — '+correct; }
  else      { quizWrong++;  el.className='quiz-result wrong';   el.textContent='오답. 정답: '+correct; }
  el.style.display='block';
  document.getElementById('quiz-correct').textContent=quizCorrect;
  document.getElementById('quiz-wrong').textContent=quizWrong;
  quizAnswered=true;
  if (quizIdx<quizOrder.length-1) {
    document.getElementById('quiz-next-btn').style.display='inline-flex';
  } else {
    setTimeout(()=>{ notify(`퀴즈 완료! ${quizCorrect}/${quizOrder.length} (${Math.round(quizCorrect/quizOrder.length*100)}%)`); },800);
  }
};
window.nextQuiz = () => {
  quizIdx++;
  if (quizIdx>=quizOrder.length) { stopQuiz(); return; }
  showQuizWord();
};
window.stopQuiz = () => { document.getElementById('quiz-overlay').style.display='none'; };
document.getElementById('quiz-overlay').addEventListener('click',e=>{
  if (e.target===document.getElementById('quiz-overlay')) stopQuiz();
});

  const container=document.getElementById('posts-container');
  if (!posts.length) {
    container.innerHTML=`<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>아직 게시물이 없습니다</p></div>`;
    return;
  }
  const myUid=currentUser?.uid;
  container.innerHTML=posts.map(p=>{
    const canDel=isAdmin||(p.uid===myUid);
    const comments=p.comments||[];
    const commHtml=comments.map(c=>{
      const cDel=isAdmin||(c.uid===myUid);
      const cTime=c.createdAt?timeAgo(typeof c.createdAt==='string'?{toDate:()=>new Date(c.createdAt)}:c.createdAt):'';
      return `<div class="comment-item">
        <div class="comment-meta">
          <span class="comment-author ${c.isAdmin?'adm':''}">${esc(c.author||'익명')}</span>
          <span class="comment-time">${cTime}</span>
          ${cDel?`<button class="comment-del" onclick="deleteComment('${p.id}','${esc(c.id)}')">×</button>`:''}
        </div>
        <div class="comment-content">${esc(c.text||'')}</div>
      </div>`;
    }).join('');
    return `<div class="post-card">
      <div class="post-meta">
        <span class="post-author ${p.isAdmin?'adm':''}">${esc(p.author||'익명')}</span>
        <span class="post-time">${p.createdAt?timeAgo(p.createdAt):''}</span>
        ${canDel?`<button class="post-del" onclick="deletePost('${p.id}')">×</button>`:''}
      </div>
      <div class="post-content">${esc(p.content||'')}</div>
      <div class="comments-section">
        ${commHtml}
        <div class="comment-form">
          <input type="text" id="comment-input-${p.id}" placeholder="댓글 달기..." onkeydown="if(event.key==='Enter')submitComment('${p.id}')">
          <button class="btn sm primary" onclick="submitComment('${p.id}')">등록</button>
        </div>
      </div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
